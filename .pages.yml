# .pages.yml
media:
  input: images/blog
  output: /images/blog

content:
  - name: blog
    label: Blog Posts
    type: collection
    path: blog              # Storing articles in the existing blog folder
    extension: html
    format: yaml-frontmatter
    delimiters: ["<!--", "-->"]
    filename: "{year}-{month}-{day}-{slug}.html" 

    fields:
      - name: title
        label: Post Title
        type: string
        required: true

      - name: date
        label: Publish Date
        type: date
        required: true

      - name: tags
        label: Tags (comma-separated)
        type: string
        required: false

      - name: discussion_link
        label: Facebook Discussion Link
        type: string
        required: false

      - name: body
        label: Visual Post Editor
        type: rich-text
        options:
          format: html     # <--- Forces the visual editor to output raw HTML instead of Markdown
        required: true
