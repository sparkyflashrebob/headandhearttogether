# .pages.yml
media:
  input: images/blog
  output: /images/blog

collections:
  - name: blog
    label: Blog Posts
    path: posts
    extension: html
    format: raw
    filename: "{year}-{month}-{day}-{slug}"
    # Explicitly mapping the media folders inside the collection 
    # tells the raw parser exactly how to process the HTML file asset paths.
    media_folder: images/blog
    public_folder: /images/blog

    fields:
      - name: title
        label: Post Title
        type: string
        required: true

      - name: body
        label: Visual Post Editor
        type: rich-text
        props:
          format: html
        required: true
