name: Compile Blog Index

on:
  push:
    branches:
      - main
    paths:
      - '_posts/**/*.html'
      - 'scripts/generate-blog-index.js'
      - '.github/workflows/generate-blog-index.yml'
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Generate Blog Index
        run: node scripts/generate-blog-index.js
        
      - name: Commit and Push index.json and compiled redirects
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/index.json blog/*.html
          git commit -m "Auto-compile blog index.json and redirect pages" || exit 0
          git push origin main
